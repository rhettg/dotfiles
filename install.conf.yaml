- create:
    ~/.local/bin:
    ~/.ssh:
      mode: 0700
- link:
    ~/.agent-skills: .agent-skills
    ~/.local/bin/agent-skills: bin/agent-skills
    ~/.bashrc:
        force: true
        path: bashrc
    ~/.bash_profile: bash_profile
    ~/.bash_prompt: bash_prompt
    ~/.exports: exports
    ~/.aliases: aliases
    ~/.path: path
    ~/.vimrc: vimrc
    ~/.dircolors: dircolors
    ~/.gitconfig: gitconfig
    ~/.functions: functions
- shell:
    - [touch ~/.hushlogin]
